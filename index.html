<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net; img-src 'self' https://* data:; font-src 'self' https://cdn.jsdelivr.net;">
    
    <link rel="icon" type="image/png" href="res/img/favicon.png">
    <title>Epic Craft</title>
    
    <script src="main.js" defer></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { 
            padding-top: 80px; 
            background-color: #0d1117; /* Um tom de azul escuro profundo estilo GitHub */
        }

        /* Animação de entrada suave */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #app {
            animation: fadeIn 0.5s ease-out;
            min-height: 60vh;
        }

        .navbar {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#/">
                <img src="res/img/favicon.png" alt="Logo" width="30" height="30" class="d-inline-block align-text-top me-2">
                Epic Craft
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#/download">Download</a></li>
                    <li class="nav-item"><a class="nav-link" target="_blank" href="https://nekyoh.github.io/epiccraft-wiki">Wiki <i class="bi bi-box-arrow-up-right small"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="app" class="rounded-4">
            <div class="d-flex justify-content-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>

        <footer class="py-5 mt-5 border-top border-secondary-subtle text-center">
            <div class="mb-3">
                <a href="https://github.com/Nekyoh/epiccraft" target="_blank" class="text-light text-decoration-none mx-3">
                    <i class="bi bi-github"></i> GitHub
                </a>
                <a href="https://opensource.org/licenses/MIT" target="_blank" class="text-light text-decoration-none mx-3">
                    <i class="bi bi-shield-check"></i> MIT License
                </a>
            </div>
            <p class="mb-0 text-secondary small">© 2026 Epic Craft Mod. Developed by Nekyoh Team.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
